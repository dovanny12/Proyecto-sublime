{% extends 'base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto; padding: 2rem; background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border-color);">
    <h1 style="text-align: center; margin-bottom: 1.5rem;">Nueva Contraseña</h1>
    <form method="POST">
        <div class="form-group" style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 700;">Nueva contraseña</label>
            <input type="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres" style="width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 8px;">
        </div>
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 700;">Confirmar contraseña</label>
            <input type="password" name="confirm" required minlength="6" placeholder="Repite la contraseña" style="width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 8px;">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Restablecer contraseña</button>
    </form>
</div>
{% endblock %}
